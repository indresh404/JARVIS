name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - main
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ✅ Cache dependencies (faster builds)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ✅ Install dependencies (Linux-safe)
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # ✅ Optional: Lint check (good for interview)
      - name: Lint check
        run: |
          cd backend
          pip install flake8
          flake8 . || true

      # ✅ Basic syntax check
      - name: Run basic check
        run: |
          cd backend
          python -m py_compile main.py

      # ✅ Optional: Run tests if present
      - name: Run tests
        run: |
          cd backend
          if [ -f "test_hf_load.py" ]; then
            python test_hf_load.py
          else
            echo "No tests found, skipping..."
          fi