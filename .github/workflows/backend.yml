name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - main
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend   # ✅ no need for "cd backend" everywhere

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'   # ✅ built-in cache (better than manual)

      # ✅ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # ✅ Safety check (prevents pywinpty-type issues ever again)
      - name: Check unwanted packages
        run: |
          pip list | grep pywinpty && exit 1 || echo "No pywinpty ✅"

      # ✅ Lint (cleaner output)
      - name: Lint check
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      # ✅ Import check (better than only py_compile)
      - name: Import check
        run: |
          python -c "import main"

      # ✅ Syntax check
      - name: Compile check
        run: |
          python -m py_compile main.py

      # ✅ Run tests (if exist)
      - name: Run tests
        run: |
          if [ -f "test_hf_load.py" ]; then
            python test_hf_load.py
          else
            echo "No tests found, skipping..."
          fi