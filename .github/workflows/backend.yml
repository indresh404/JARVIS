name: Backend CI

on:
  push:
    paths: ['backend/**']
    branches: [main]
  pull_request:
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run basic check
        run: |
          cd backend
          python -m py_compile main.py